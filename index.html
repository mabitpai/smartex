    <!-- SCREEN 1: SINGLE LOGIN & REGISTER -->
    <div id="screen-auth" class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-slate-900/95 rounded-3xl shadow-2xl border border-slate-800 p-8 glow-teal">
            
            <div class="text-center mb-6">

    <!-- SCREEN 2: ADMIN & GURU DASHBOARD -->

                <div>
                    <h2 class="font-bold text-white text-sm truncate max-w-[140px]" id="dash-user-name">Pengguna</h2>

    <!-- SCREEN 3: SISWA AREA (PAGINATED) -->

        <div class="mobile-simulator flex flex-col min-h-screen md:min-h-0 bg-slate-900 text-slate-200">
            <header class="bg-slate-950 border-b border-slate-800 px-5 py-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center"><i class="fas fa-user-graduate text-sm text-teal-400"></i></div>
                    <div>
                        <p class="text-[10px] text-teal-400 font-bold uppercase tracking-wider">Peserta Ujian</p>

                    <span class="px-2.5 py-1 bg-slate-800 rounded-full text-[9px] font-bold text-gold-premium border border-slate-700 uppercase" id="stu-kelas">KELAS</span>
                    <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-rose-950 hover:bg-rose-900 text-rose-400 border border-rose-800 flex items-center justify-center transition shadow-md" title="Keluar dari Aplikasi">

    <!-- JAVASCRIPT GLOBAL SYSTEM ENGINE -->
    <script>
        // =========================================================================
        // WAJIB DIISI: GANTI KODE DI BAWAH INI DENGAN CONFIG DARI FIREBASE CONSOLE ANDA
        // =========================================================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBpN4_H90p0KM633c6y1G4J0VYZ0usjfJk",
            authDomain: "smartex-998c2.firebaseapp.com",
            projectId: "smartex-998c2",
            storageBucket: "smartex-998c2.firebasestorage.app",
            messagingSenderId: "240864118301",
            appId: "1:240864118301:web:c1659b36f59d282c8b28f4"
        };
        // =========================================================================

        // Data Default/Mockup
        let db = {
            Tabel_Siswa: [{ Email: "siswa1@sekolah.id", Nama: "Rian Hidayat", Kelas: "XII-IPA-1", Peran: "siswa", Status: "Active" }],
            Tabel_Guru: [{ Email: "guru1@sekolah.id", Nama: "Drs. Hermawan", ID_Mapel: "M-01", Peran: "guru", Status: "Active" }],
            Tabel_Mapel: [{ ID_Mapel: "M-01", Nama_Mapel: "Biologi" }, { ID_Mapel: "M-02", Nama_Mapel: "Fisika" }],
            Tabel_Kelas: [{ ID_Kelas: "XII-IPA-1", Nama_Kelas: "XII-IPA-1" }, { ID_Kelas: "XII-IPA-2", Nama_Kelas: "XII-IPA-2" }],
            Tabel_Jadwal: [{ ID_Jadwal: "J-01", ID_Mapel: "M-01", ID_Kelas: "XII-IPA-1", Waktu_Mulai: "2026-05-18T07:30", Durasi_Menit: 90, Status: "Aktif" }],
            Tabel_Soal: [{ ID_Soal: "S01", ID_Mapel: "M-01", Tipe_Soal: "PG", Teks_Soal: "Manakah organel sel tumbuhan berikut yang bertanggung jawab terhadap fotosintesis?", Tipe_Media: "none", URL_Media: "", Opsi_Jawaban: "A. Mitokondria|B. Kloroplas|C. Ribosom|D. Lisosom|E. Vakuola", Kunci_Jawaban: "B" }],
            Tabel_Hasil: []
        };

        let masterAdmin = { Email: "abdulmuis11@guru.sma.belajar.id", Nama: "Administrator Utama", Peran: "admin" };
        let currentUser = null, activeExam = null, examTimerInterval = null, violationCount = 0, isExamActive = false;
        let currentQIndex = 0, activeQuestions = [];
        let firestoreDb = null, isFirebaseConnected = false;

        window.onload = () => {
            initDatabaseFromLocalStorage();
            renderInitialDropdowns();
            toggleRegAttributePanel();
            autoInitializeFirebaseConfig(); 
            
            // Check session login (Auto Login)
            let savedSession = localStorage.getItem('smartex_auth_session');
            if(savedSession) {
                try {
                    let s = JSON.parse(savedSession);
                    document.getElementById('login-email').value = s.Email;
                    // Delay sejenak menunggu sinkronisasi database awan
                    setTimeout(() => { handleAuthLoginFlow(new Event('submit')); }, 1000);
                } catch(e){}
            }
        };

        function initDatabaseFromLocalStorage() {
            let localDb = localStorage.getItem('fb_exambro_db');
            if(localDb) { try { db = JSON.parse(localDb); } catch(e) {} }
        }

        function saveDatabaseToLocalStorage() { localStorage.setItem('fb_exambro_db', JSON.stringify(db)); }

        // FUNGSI INI KINI MENGGUNAKAN KONFIGURASI HARCODED DI ATAS UNTUK MENARIK DATA SECARA GLOBAL
        async function autoInitializeFirebaseConfig() {
            // Cek apakah admin sudah memasukkan API Key di baris kode atas
            if(FIREBASE_CONFIG.apiKey !== "") {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
                    firestoreDb = firebase.firestore();
                    isFirebaseConnected = true;
                    
                    document.getElementById('status-koneksi').innerHTML = `<i class="fas fa-satellite-dish"></i> Menarik Data dari Cloud...`;
                    
                    // Tarik seluruh data (PULL) dari Firebase Cloud untuk menimpa mockup lokal
                    await syncDataFromFirebase();
                    
                    document.getElementById('status-koneksi').innerHTML = `<i class="fas fa-cloud text-teal-400"></i> Terhubung Aman Ke Cloud Firebase`;
                    document.getElementById('status-koneksi').classList.remove('animate-pulse', 'text-amber-500');
                    document.getElementById('status-koneksi').classList.add('text-teal-400');
                } catch(e) { console.error("Firebase startup fault: ", e); }
            } else {
                document.getElementById('status-koneksi').innerHTML = `<i class="fas fa-exclamation-circle text-amber-500"></i> Firebase Config Belum Diisi di Source Code!`;
                document.getElementById('status-koneksi').classList.remove('animate-pulse');
            }
        }

        // FUNGSI PENGAMBILAN DATA MASTER FIREBASE
        async function syncDataFromFirebase() {
            if(!isFirebaseConnected) return;
            try {
                const tables = ['kelas', 'mapel', 'users_siswa', 'users_guru', 'jadwal', 'soal', 'hasil'];
                for (let t of tables) {
                    let snapshot = await firestoreDb.collection(t).get();
                    if(!snapshot.empty) {
                        let fData = snapshot.docs.map(doc => doc.data());
                        if(t === 'kelas') db.Tabel_Kelas = fData;
                        if(t === 'mapel') db.Tabel_Mapel = fData;
                        if(t === 'users_siswa') db.Tabel_Siswa = fData;
                        if(t === 'users_guru') db.Tabel_Guru = fData;
                        if(t === 'jadwal') db.Tabel_Jadwal = fData;
                        if(t === 'soal') db.Tabel_Soal = fData;
                        if(t === 'hasil') db.Tabel_Hasil = fData;
                    }
                }
                saveDatabaseToLocalStorage(); // Timpa local memori
                renderInitialDropdowns();     // Segarkan dropdown Pendaftaran di semua HP murid!
            } catch (error) {
                console.error("Gagal sinkronisasi data dari Firebase: ", error);
            }
        }

        function renderInitialDropdowns() {
            let kSel = document.getElementById('reg-kelas');
            let mSel = document.getElementById('reg-mapel');
            if(kSel) kSel.innerHTML = db.Tabel_Kelas.map(k => `<option value="${k.ID_Kelas}">${k.ID_Kelas}</option>`).join('');
            if(mSel) mSel.innerHTML = db.Tabel_Mapel.map(m => `<option value="${m.ID_Mapel}">${m.Nama_Mapel}</option>`).join('');
        }

        function toggleAuthViewport(mode) {
            if(mode === 'signup') { document.getElementById('box-login').classList.add('hidden'); document.getElementById('box-signup').classList.remove('hidden'); } 
            else { document.getElementById('box-signup').classList.add('hidden'); document.getElementById('box-login').classList.remove('hidden'); }
        }

        function toggleRegAttributePanel() {
            let val = document.getElementById('reg-peran').value;
            if(val === 'siswa') { document.getElementById('panel-attr-siswa').classList.remove('hidden'); document.getElementById('panel-attr-guru').classList.add('hidden'); } 
            else { document.getElementById('panel-attr-siswa').classList.add('hidden'); document.getElementById('panel-attr-guru').classList.remove('hidden'); }
        }

        function handleAuthLoginFlow(e) {
            if(e) e.preventDefault();
            let email = document.getElementById('login-email').value.trim();

            if(email === masterAdmin.Email) {
                currentUser = masterAdmin; localStorage.setItem('smartex_auth_session', JSON.stringify(currentUser));
                showScreen('dashboard'); buildDashboardRouterMenu(); return;
            }
            let t = db.Tabel_Guru.find(g => g.Email === email);
            if(t) {
                if(t.Status === 'Pending') { showCustomSystemDialog("Akses Ditangguhkan", "Akun Guru masih PENDING persetujuan Admin.", "warning"); return; }
                currentUser = t; localStorage.setItem('smartex_auth_session', JSON.stringify(currentUser));
                showScreen('dashboard'); buildDashboardRouterMenu(); return;
            }
            let s = db.Tabel_Siswa.find(x => x.Email === email);
            if(s) {
                if(s.Status === 'Pending') { showCustomSystemDialog("Akses Ditangguhkan", "Akun Siswa belum di-Approve oleh Admin.", "warning"); return; }
                currentUser = s; localStorage.setItem('smartex_auth_session', JSON.stringify(currentUser));
                showScreen('siswa'); renderStudentLandingArea(); return;
            }
            showCustomSystemDialog("Autentikasi Gagal", "Alamat email tidak terdaftar.", "error");
        }

        function handleAuthRegisterFlow(e) {
            e.preventDefault();
            let email = document.getElementById('reg-email').value.trim();
            let nama = document.getElementById('reg-nama').value.trim();
            let peran = document.getElementById('reg-peran').value;

            if(db.Tabel_Siswa.some(x => x.Email===email) || db.Tabel_Guru.some(x => x.Email===email) || email===masterAdmin.Email) {
                showCustomSystemDialog("Pendaftaran Gagal", "Alamat email bersangkutan sudah terdaftar.", "error"); return;
            }

            let payload = { Email: email, Nama: nama, Peran: peran, Status: "Pending", Timestamp: new Date().toLocaleDateString('id-ID') };
            if(peran === 'siswa') {
                payload.Kelas = document.getElementById('reg-kelas').value; db.Tabel_Siswa.push(payload);
                if(isFirebaseConnected) firestoreDb.collection('users_siswa').doc(email).set(payload);
            } else {
                payload.ID_Mapel = document.getElementById('reg-mapel').value; db.Tabel_Guru.push(payload);
                if(isFirebaseConnected) firestoreDb.collection('users_guru').doc(email).set(payload);
            }
            saveDatabaseToLocalStorage();
            showCustomSystemDialog("Daftar Berhasil", "Registrasi akun diajukan! Status PENDING menunggu persetujuan Admin.", "success", () => toggleAuthViewport('login'));
        }

        function handleLogout() {
            if(isExamActive) { showCustomSystemDialog("Aksi Ditolak", "Anda tidak dapat keluar di tengah ujian!", "warning"); return; }
            currentUser = null; localStorage.removeItem('smartex_auth_session'); document.getElementById('login-email').value = ''; showScreen('auth');
        }

        function showScreen(id) {
            document.getElementById('screen-auth').classList.add('hidden'); document.getElementById('screen-dashboard').classList.add('hidden'); document.getElementById('screen-siswa').classList.add('hidden');
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }

        function buildDashboardRouterMenu() {
            document.getElementById('dash-user-name').innerText = currentUser.Nama;
            document.getElementById('dash-user-role').innerText = currentUser.Peran === 'admin' ? 'Super Admin' : 'Guru Mapel';
            let nav = document.getElementById('dash-nav'); nav.innerHTML = ''; let menus = [];
            if(currentUser.Peran === 'admin') {
                menus = [
                    { id: 'ad-stat', name: 'Ringkasan Statistik', icon: 'fa-chart-pie', action: viewAdminVisualStats },
                    { id: 'ad-approve', name: 'Persetujuan Akun', icon: 'fa-user-check', action: viewApprovalWorkflowArea },
                    { id: 'ad-mapel', name: 'Mata Pelajaran', icon: 'fa-book-bookmark', action: viewManageMapelPanel },
                    { id: 'ad-kelas', name: 'Manajemen Kelas', icon: 'fa-school-flag', action: viewManageKelasPanel },
                    { id: 'ad-siswa', name: 'Data Master Siswa', icon: 'fa-users', action: viewManageSiswaPanel },
                    { id: 'ad-guru', name: 'Data Master Guru', icon: 'fa-user-tie', action: viewManageGuruPanel },
                    { id: 'ad-soal', name: 'Bank Soal Ujian', icon: 'fa-folder-open', action: viewManageSoalPanel },
                    { id: 'ad-jadwal', name: 'Jadwal Ujian Rilis', icon: 'fa-calendar-days', action: viewManageJadwalPanel },
                    { id: 'ad-rekap', name: 'Laporan Rekap Nilai', icon: 'fa-file-invoice', action: viewRekapNilaiPanel }
                ];
            } else {
                menus = [
                    { id: 'gr-soal', name: 'Bank Soal (5 Opsi)', icon: 'fa-folder-open', action: viewManageSoalPanel },

        function processAccountApproval(role, email, action) {
            let userList = role === 'siswa' ? db.Tabel_Siswa : db.Tabel_Guru; let idx = userList.findIndex(x => x.Email === email);

                if(action === 'Active') {

            else if(tipe === 'ESAI') { container.innerHTML = `<input type="hidden" id="form-opsi-raw" value=""><input type="hidden" id="form-kunci-raw" value="Koreksi Manual"><p class="text-xs text-slate-500 italic">Esai tidak divalidasi kunci otomatis (Koreksi manual guru).</p>`; }

        function handleSaveManualSoalFlow(e) {
            e.preventDefault();
            let tipe = document.getElementById('form-s-tipe').value; let opsi, kunci;

            if(tipe === 'PG' || tipe === 'PG_KOMPLEKS') {
                let arr = []; ['A','B','C','D','E'].forEach(lbl => arr.push(lbl + '. ' + document.getElementById('opt-raw-'+lbl).value.trim())); opsi = arr.join('|');
                let keys = Array.from(document.querySelectorAll('input[name="key-raw"]:checked')).map(el => el.value);
                if(keys.length === 0) { showCustomSystemDialog("Validasi", "Minimal 1 kunci jawaban harus dicentang.", "warning"); return; }
                kunci = keys.join(',');
            } else {
                opsi = document.getElementById('form-opsi-raw').value; kunci = document.getElementById('form-kunci-raw').value;
                if(tipe === 'URUTAN' || tipe === 'JODOH') kunci = opsi;
            }

            let payload = {
                ID_Soal: "S" + (db.Tabel_Soal.length+1).toString().padStart(3, '0'), ID_Mapel: document.getElementById('form-s-mapel').value,
                Tipe_Soal: tipe, Teks_Soal: document.getElementById('form-s-teks').value, Tipe_Media: document.getElementById('form-s-mediatype').value,
                URL_Media: document.getElementById('form-s-mediaurl').value, Opsi_Jawaban: opsi, Kunci_Jawaban: kunci
            };

            db.Tabel_Soal.push(payload); saveDatabaseToLocalStorage();
            if(isFirebaseConnected) firestoreDb.collection('soal').doc(payload.ID_Soal).set(payload);
            document.getElementById('wrapper-form-soal').classList.add('hidden'); triggerFilterSoalDatabase();
            showCustomSystemDialog("Berhasil", "Soal baru berhasil direkam ke bank soal.", "success");
        }

        function triggerFilterSoalDatabase() {
            let tbody = document.getElementById('tbody-soal'); if(!tbody) return;
            let fMapel = document.getElementById('flt-s-mapel').value; let fTipe = document.getElementById('flt-s-tipe').value; let fKeyword = document.getElementById('flt-s-keyword').value.toLowerCase();
            let list = db.Tabel_Soal.filter(q => (fMapel===""||q.ID_Mapel===fMapel) && (fTipe===""||q.Tipe_Soal===fTipe) && (fKeyword===""||q.Teks_Soal.toLowerCase().includes(fKeyword)));

            if(list.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-slate-500 italic">Tidak ada butir soal kriteria cocok.</td></tr>`; return; }
            tbody.innerHTML = list.map(q => {
                let mediaTag = q.URL_Media ? `<div class="mt-1 text-[10px] text-blue-400 font-mono font-medium truncate max-w-sm"><i class="fas fa-link mr-1"></i>[${q.Tipe_Media.toUpperCase()}] ${q.URL_Media}</div>` : '';
                return `
                    <tr class="hover:bg-slate-900 transition text-slate-300">
                        <td class="p-4 font-mono font-bold text-slate-500 text-center">${q.ID_Soal}</td>
                        <td class="p-4"><span class="px-2 py-0.5 bg-slate-900 border border-slate-800 text-slate-300 font-bold rounded text-[9px] uppercase tracking-wider">${q.Tipe_Soal}</span></td>
                        <td class="p-4 text-xs font-medium text-slate-200"><div class="line-clamp-2">${q.Teks_Soal}</div>${mediaTag}</td>
                        <td class="p-4 font-mono text-xs font-bold text-emerald-400 bg-emerald-950/20">${q.Kunci_Jawaban}</td>
                        <td class="p-4 text-center"><button onclick="deleteSoalAction('${q.ID_Soal}')" class="text-rose-500 hover:text-rose-400 transition p-2"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `;
            }).join('');
        }

        function deleteSoalAction(id) {
            showCustomSystemDialog("Hapus Soal", `Menghapus butir soal dengan ID ${id}?`, "warning", () => {
                db.Tabel_Soal = db.Tabel_Soal.filter(s => s.ID_Soal !== id); saveDatabaseToLocalStorage();
                if(isFirebaseConnected) firestoreDb.collection('soal').doc(id).delete();
                triggerFilterSoalDatabase();
            });
        }

        function downloadTemplateExcel(type) {
            let data = [];
            if(type === 'soal') data = [["ID_Soal", "ID_Mapel", "Tipe_Soal", "Teks_Soal", "Tipe_Media", "URL_Media", "Opsi_Jawaban", "Kunci_Jawaban"], ["S-AUTO", "M-01", "PG", "Contoh?", "none", "", "A. Opsi A|B. Opsi B|C. Opsi C|D. Opsi D|E. Opsi E", "A"]];
            else if(type === 'siswa') data = [["Email", "Nama", "Kelas"], ["siswa_baru@sekolah.id", "Aris", "XII-IPA-1"]];
            else if(type === 'guru') data = [["Email", "Nama", "ID_Mapel"], ["guru@sekolah.id", "Hartono", "M-01"]];
            else if(type === 'kelas') data = [["ID_Kelas", "Nama_Kelas"], ["XII-IPA-3", "XII-IPA-3"]];
            else if(type === 'mapel') data = [["ID_Mapel", "Nama_Mapel"], ["M-03", "Kimia"]];

            let ws = XLSX.utils.aoa_to_sheet(data); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); XLSX.writeFile(wb, `Template_${type}.xlsx`);
        }

        function handleExcelImportFlow(e, type) {
            let file = e.target.files[0]; if(!file) return;
            let reader = new FileReader();
            reader.onload = function(evt) {
                let workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                let rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                rows.forEach(r => {
                    r.Status = "Active";
                    if(type === 'soal') { r.ID_Soal = "S" + (db.Tabel_Soal.length+1).toString().padStart(3, '0'); db.Tabel_Soal.push(r); if(isFirebaseConnected) firestoreDb.collection('soal').doc(r.ID_Soal).set(r); }
                    else if(type === 'siswa') { r.Peran = 'siswa'; db.Tabel_Siswa.push(r); if(isFirebaseConnected) firestoreDb.collection('users_siswa').doc(r.Email).set(r); }
                    else if(type === 'guru') { r.Peran = 'guru'; db.Tabel_Guru.push(r); if(isFirebaseConnected) firestoreDb.collection('users_guru').doc(r.Email).set(r); }
                    else if(type === 'kelas') { db.Tabel_Kelas.push(r); if(isFirebaseConnected) firestoreDb.collection('kelas').doc(r.ID_Kelas).set(r); }
                    else if(type === 'mapel') { db.Tabel_Mapel.push(r); if(isFirebaseConnected) firestoreDb.collection('mapel').doc(r.ID_Mapel).set(r); }
                });
                saveDatabaseToLocalStorage(); renderInitialDropdowns();
                showCustomSystemDialog("Impor Berhasil", `${rows.length} baris data dimuat.`, "success", () => {
                    if(type==='soal') triggerFilterSoalDatabase(); else if(type==='siswa') viewManageSiswaPanel(); else if(type==='guru') viewManageGuruPanel(); else if(type==='kelas') viewManageKelasPanel(); else if(type==='mapel') viewManageMapelPanel();
                });
            }; reader.readAsArrayBuffer(file);
        }

                <div class="bg-slate-950 rounded-2xl border border-slate-850 overflow-hidden shadow-lg"><table class="w-full text-left text-xs"><thead class="bg-slate-900 border-b border-slate-850 text-slate-400"><tr><th class="p-3">Identitas Siswa</th><th class="p-3">Sesi / Mapel / Kelas</th><th class="p-3 text-center">Skor</th><th class="p-3 text-red-400">Pelanggaran</th><th class="p-3">Waktu Selesai</th><th class="p-3 w-16 text-center"><i class="fas fa-cog"></i></th></tr></thead><tbody id="tbody-rekap" class="divide-y divide-slate-850 text-slate-300"></tbody></table></div>
            `;
            renderRekapTableData();
        }

        function renderRekapTableData() {
            let tbody = document.getElementById('tbody-rekap');
            let fKls = document.getElementById('flt-r-kelas').value; let fMpl = document.getElementById('flt-r-mapel').value; let fSrc = document.getElementById('flt-r-search').value.toLowerCase();

            let joinedData = db.Tabel_Hasil.map(h => {
                let s = db.Tabel_Siswa.find(x => x.Email === h.Email) || { Nama: 'Terhapus', Kelas: '-' };
                let j = db.Tabel_Jadwal.find(x => x.ID_Jadwal === h.ID_Jadwal) || { ID_Mapel: '-' };
                return { ...h, NamaSiswa: s.Nama, KelasSiswa: s.Kelas, ID_Mapel: j.ID_Mapel };
            });

            let filtered = joinedData.filter(x => (fKls === "" || x.KelasSiswa === fKls) && (fMpl === "" || x.ID_Mapel === fMpl) && (fSrc === "" || x.NamaSiswa.toLowerCase().includes(fSrc) || x.Email.toLowerCase().includes(fSrc)));

            if(filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-slate-500 italic">Tidak ada data rekap yang sesuai filter.</td></tr>`; return; }

            tbody.innerHTML = filtered.map(x => `
                <tr class="hover:bg-slate-900 transition">
                    <td class="p-3"><span class="block font-bold text-slate-200">${x.NamaSiswa}</span><span class="text-[10px] text-slate-400">${x.Email}</span></td>
                    <td class="p-3 font-semibold text-slate-300">${x.ID_Mapel} <br><span class="font-normal text-[10px] text-slate-500">${x.KelasSiswa} | ${x.ID_Jadwal}</span></td>
                    <td class="p-3 text-center font-extrabold text-teal-400 bg-teal-950/20 text-sm">${x.Skor}</td>
                    <td class="p-3 font-bold ${x.Log_Pelanggaran > 0 ? 'text-red-400' : 'text-emerald-500'}">${x.Log_Pelanggaran === 0 ? '<i class="fas fa-check-circle"></i> Bersih' : `${x.Log_Pelanggaran} Terdeteksi`}</td>
                    <td class="p-3 font-mono text-[10px] text-slate-500">${x.Waktu_Submit}</td>
                    <td class="p-3 text-center"><button onclick="deleteHasilAction('${x.ID_Hasil}')" class="text-rose-500 hover:text-rose-400 transition p-2"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        function deleteHasilAction(id) {
            showCustomSystemDialog("Hapus Nilai", `Yakin ingin menghapus rekap ujian dengan ID ${id}? Aksi ini memungkinkan siswa mengulang ujian.`, "warning", () => {
                db.Tabel_Hasil = db.Tabel_Hasil.filter(h => h.ID_Hasil !== id); saveDatabaseToLocalStorage();
                if(isFirebaseConnected) firestoreDb.collection('hasil').doc(id).delete();
                renderRekapTableData();
            });
        }

        function exportToExcelAction() {
            if(db.Tabel_Hasil.length === 0) { showCustomSystemDialog("Gagal Ekspor", "Data masih kosong.", "error"); return; }
            let ws = XLSX.utils.json_to_sheet(db.Tabel_Hasil); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Rekap_Nilai"); XLSX.writeFile(wb, "Rekap_Nilai_Exambro_Cloud.xlsx");
        }
        function exportToPdfAction() {
            if(db.Tabel_Hasil.length === 0) { showCustomSystemDialog("Gagal Ekspor", "Data masih kosong.", "error"); return; }
            const { jsPDF } = window.jspdf; let doc = new jsPDF(); doc.setFont("Helvetica", "bold"); doc.setFontSize(14); doc.text("LAPORAN HASIL BELAJAR SISWA - EXAMBRO CLOUD", 14, 15);
            doc.autoTable({ head: [['ID', 'Email Siswa', 'ID Sesi', 'Skor', 'Pelanggaran', 'Waktu']], body: db.Tabel_Hasil.map(h => [h.ID_Hasil, h.Email, h.ID_Jadwal, h.Skor, h.Log_Pelanggaran, h.Waktu_Submit]), startY: 22, headStyles: { fillColor: [0, 128, 128] } });
            doc.save("Laporan_Nilai_Exambro.pdf");
        }

        // ==========================================================
        // WORKSPACE AREA SISWA (ONE-BY-ONE PAGINATION ENGINE + AUTOSAVE)
        // ==========================================================
        function renderStudentLandingArea() {
            document.getElementById('stu-name').innerText = currentUser.Nama;
            document.getElementById('stu-kelas').innerText = currentUser.Kelas;
            
            let canvas = document.getElementById('stu-content');
            let relevantJadwal = db.Tabel_Jadwal.filter(j => j.ID_Kelas === currentUser.Kelas);

            if(relevantJadwal.length === 0) {
                canvas.innerHTML = `
                    <div class="text-center py-12 px-4 bg-slate-900 border border-slate-800 rounded-3xl mt-6">
                        <i class="fas fa-calendar-times text-3xl text-slate-600 mb-3"></i>
                        <h4 class="font-bold text-xs text-slate-300">Tidak Ada Sesi Ujian</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Saat ini belum ada sesi ujian aktif yang dijadwalkan untuk kelas ${currentUser.Kelas}.</p>
                    </div>
                `; return;
            }

            canvas.innerHTML = `
                <div class="space-y-4">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Daftar Jadwal Ujian Aktif</p>
                    ${relevantJadwal.map(j => {
                        let mapel = db.Tabel_Mapel.find(m => m.ID_Mapel === j.ID_Mapel);
                        let isFinished = db.Tabel_Hasil.some(h => h.Email === currentUser.Email && h.ID_Jadwal === j.ID_Jadwal);
                        let sessionKey = `smx_resume_${currentUser.Email}_${j.ID_Jadwal}`;
                        let hasResume = localStorage.getItem(sessionKey);
                        
                        let btnStatus = isFinished ? 
                            `<button disabled class="w-full py-2.5 bg-slate-800 text-slate-500 font-bold rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 cursor-not-allowed">Selesai Dikerjakan <i class="fas fa-check"></i></button>` :
                            (hasResume ? 
                                `<button onclick="triggerVerificationFlow('${j.ID_Jadwal}')" class="w-full py-2.5 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 transition shadow-md shadow-amber-900/50">Lanjutkan Sisa Ujian <i class="fas fa-play text-[10px]"></i></button>` :
                                `<button onclick="triggerVerificationFlow('${j.ID_Jadwal}')" class="w-full py-2.5 bg-teal-premium hover:bg-teal-700 text-white font-bold rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 transition shadow-md shadow-teal-900/50">Mulai Ujian <i class="fas fa-play text-[10px]"></i></button>`
                            );

                        return `
                            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg flex flex-col justify-between items-start gap-4">
                                <div class="w-full">
                                    <span class="px-2 py-0.5 bg-teal-950 border border-teal-800 text-teal-400 font-bold text-[9px] rounded uppercase">${j.ID_Mapel}</span>
                                    <h4 class="font-bold text-sm text-white mt-2">${mapel ? mapel.Nama_Mapel : 'Evaluasi Belajar'}</h4>
                                    <p class="text-[10px] text-slate-500 mt-1"><i class="fas fa-clock mr-1"></i>Durasi Batas: ${j.Durasi_Menit} Menit</p>
                                </div>
                                ${btnStatus}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function triggerVerificationFlow(idJadwal) {
            activeExam = db.Tabel_Jadwal.find(j => j.ID_Jadwal === idJadwal);
            let canvas = document.getElementById('stu-content');
            canvas.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl mt-6 text-center animate-fade-in">
                    <div class="w-14 h-14 bg-amber-950/40 text-amber-500 border border-amber-800 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i class="fas fa-shield-lock"></i></div>
                    <h3 class="font-bold text-slate-200 text-sm">Validasi Integritas Layar</h3>
                    <p class="text-[10px] text-slate-400 mt-2 leading-relaxed">Sistem akan memvalidasi mode <b>Layar Penuh (Fullscreen)</b>. Pembagian layar (split screen), menekan tombol navigasi, atau pindah tab terekam sebagai kecurangan secara otomatis.</p>
                    <div class="my-4 p-3 bg-amber-950/20 border border-amber-900/40 rounded-2xl text-left text-[10px] text-amber-300">
                        <h4 class="font-bold mb-1"><i class="fas fa-sync"></i> Auto-Save Aktif:</h4>
                        <p class="leading-relaxed">Jawaban Anda disimpan otomatis setiap detik. Jika terputus, waktu akan dilanjutkan dari sisa sebelumnya.</p>
                    </div>
                    <button onclick="requestEnforceFullscreen()" class="w-full py-3 bg-gold-premium hover:bg-yellow-600 text-slate-950 font-extrabold rounded-2xl text-xs uppercase tracking-wider shadow-md transition">Kunci Layar & Mulai</button>
                    <button onclick="renderStudentLandingArea()" class="mt-4 text-slate-500 hover:text-slate-300 text-[10px] font-bold uppercase transition">Batal Mengikuti Ujian</button>
                </div>
            `;
        }

        function requestEnforceFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().then(startPaginatorExamExecution).catch(() => { showCustomSystemDialog("Akses Ditolak", "Browser menolak mode fullscreen. Pastikan perizinan aktif.", "error"); }); } 
            else { startPaginatorExamExecution(); }
        }

        function startPaginatorExamExecution() {
            isExamActive = true;
            activeQuestions = db.Tabel_Soal.filter(q => q.ID_Mapel === activeExam.ID_Mapel);
            
            let sessionKey = `smx_resume_${currentUser.Email}_${activeExam.ID_Jadwal}`;
            let savedSession = localStorage.getItem(sessionKey);
            let secondsLeft = activeExam.Durasi_Menit * 60;

            // RESTORE SESSION LOGIC
            if(savedSession) {
                let parsed = JSON.parse(savedSession);
                activeExam.jawabanSiswa = parsed.ans || {};
                secondsLeft = parsed.time || secondsLeft;
                violationCount = parsed.viol || 0;
                currentQIndex = parsed.idx || 0;
            } else {
                activeExam.jawabanSiswa = {};
                violationCount = 0;
                currentQIndex = 0;
            }

            renderPaginatorExamViewport();

            examTimerInterval = setInterval(() => {
                secondsLeft--;
                if(secondsLeft <= 0) {
                    clearInterval(examTimerInterval);
                    autoSubmitExamFlow();
                } else {
                    let m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
                    let s = (secondsLeft % 60).toString().padStart(2, '0');
                    let el = document.getElementById('clock-text');
                    if(el) el.innerText = `${m}:${s}`;
                    
                    // AUTO SAVE KONDISI UJIAN KE RAM LOKAL
                    localStorage.setItem(sessionKey, JSON.stringify({
                        ans: activeExam.jawabanSiswa,
                        time: secondsLeft,
                        viol: violationCount,
                        idx: currentQIndex
                    }));
                }
            }, 1000);
        }

        function renderPaginatorExamViewport() {
            let canvas = document.getElementById('stu-content');
            if(activeQuestions.length === 0) { canvas.innerHTML = `<div class="p-4 text-center text-slate-500 text-xs">Belum ada paket soal mapel ini.</div>`; return; }

            let q = activeQuestions[currentQIndex];
            let mapel = db.Tabel_Mapel.find(m => m.ID_Mapel === activeExam.ID_Mapel);

            let htmlHeader = `
                <div class="bg-slate-950 p-3 rounded-2xl border border-slate-850 flex items-center justify-between mb-4 shadow-md">
                    <div><h4 class="text-[10px] font-extrabold text-teal-400 uppercase tracking-widest truncate max-w-[150px]">${mapel ? mapel.Nama_Mapel : 'Ujian'}</h4><p class="text-[9px] text-slate-500 mt-0.5">Soal ${currentQIndex + 1} dari ${activeQuestions.length}</p></div>
                    <div class="flex items-center gap-1.5 bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-xl font-mono text-xs font-bold text-amber-400"><i class="fas fa-clock text-amber-500"></i> <span id="clock-text">--:--</span></div>
                </div>
            `;

            let htmlMedia = '';
            if(q.Tipe_Media === 'gambar' && q.URL_Media) htmlMedia = `<img src="${q.URL_Media}" class="w-full max-h-40 object-contain rounded-2xl mb-3 border border-slate-800" alt="soal">`;
            else if(q.Tipe_Media === 'video' && q.URL_Media) htmlMedia = `<div class="w-full h-36 rounded-2xl overflow-hidden mb-3 border border-slate-800"><iframe src="${q.URL_Media.replace("watch?v=", "embed/")}" class="w-full h-full" allowfullscreen></iframe></div>`;

            let htmlInput = '';
            let savedAns = activeExam.jawabanSiswa[q.ID_Soal] || '';

            if(q.Tipe_Soal === 'PG' || q.Tipe_Soal === 'PG_KOMPLEKS') {
                let options = q.Opsi_Jawaban.split('|'); let isComplex = q.Tipe_Soal === 'PG_KOMPLEKS';
                htmlInput = `<div class="space-y-2">` + options.map(o => {
                    let char = o.trim().substring(0, 1); let isChecked = isComplex ? savedAns.split(',').includes(char) : savedAns === char;
                    return `<label class="flex items-center gap-3 p-3 bg-slate-900 border border-slate-850 rounded-2xl hover:border-teal-500/50 cursor-pointer text-xs transition"><input type="${isComplex ? 'checkbox' : 'radio'}" name="ans-${q.ID_Soal}" value="${char}" ${isChecked ? 'checked' : ''} onchange="${isComplex ? 'savePaginatorAnswerComplex()' : 'savePaginatorAnswerSingle(this.value)'}" class="w-4 h-4 text-teal-600 focus:ring-teal-500"><span>${o}</span></label>`;
                }).join('') + `</div>`;
            } else if(q.Tipe_Soal === 'BENAR_SALAH') {
                htmlInput = `<div class="flex gap-2"><button type="button" onclick="savePaginatorAnswerSingle('Benar'); renderPaginatorExamViewport()" class="flex-1 py-3 border rounded-xl font-bold text-xs ${savedAns==='Benar' ? 'bg-teal-premium border-teal-500 text-white' : 'bg-slate-900 border-slate-850 text-slate-300'}">Benar</button><button type="button" onclick="savePaginatorAnswerSingle('Salah'); renderPaginatorExamViewport()" class="flex-1 py-3 border rounded-xl font-bold text-xs ${savedAns==='Salah' ? 'bg-teal-premium border-teal-500 text-white' : 'bg-slate-900 border-slate-850 text-slate-300'}">Salah</button></div>`;
            } else if(q.Tipe_Soal === 'URUTAN') {
                let items = q.Opsi_Jawaban.split('|'); if(savedAns) items = savedAns.split('|');
                htmlInput = `<div class="space-y-2 p-2 bg-slate-950 border border-slate-850 rounded-2xl" id="order-box-${q.ID_Soal}">${items.map(it => `<div data-val="${it}" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-800 rounded-xl text-xs text-slate-200"><span>${it}</span><div class="flex gap-1"><button onclick="moveItemUp(this); savePaginatorAnswerOrder()" class="p-1 px-2 bg-slate-800 rounded text-[10px] font-bold"><i class="fas fa-chevron-up"></i></button><button onclick="moveItemDown(this); savePaginatorAnswerOrder()" class="p-1 px-2 bg-slate-800 rounded text-[10px] font-bold"><i class="fas fa-chevron-down"></i></button></div></div>`).join('')}</div>`;
            } else if(q.Tipe_Soal === 'JODOH') {
                let pairs = q.Opsi_Jawaban.split(','); let keysLeft = pairs.map(p => p.split(':')[0]); let valuesRight = pairs.map(p => p.split(':')[1]);
                htmlInput = `<div class="space-y-2">` + keysLeft.map(kl => {
                    let preVal = ''; if(savedAns) { let fPair = savedAns.split(',').find(p => p.startsWith(kl+":")); if(fPair) preVal = fPair.split(':')[1]; }
                    return `<div class="flex items-center gap-2 bg-slate-900 p-2.5 border border-slate-850 rounded-2xl text-xs"><span class="w-1/3 font-semibold text-slate-300">${kl}</span><i class="fas fa-arrow-right text-slate-600 text-[10px]"></i><select onchange="savePaginatorAnswerJodoh()" data-left="${kl}" class="flex-1 p-2 bg-slate-950 border border-slate-850 rounded-xl text-xs text-teal-400 outline-none"><option value="">-- Jodohkan --</option>${valuesRight.map(vr => `<option value="${vr}" ${preVal===vr ? 'selected':''}>${vr}</option>`).join('')}</select></div>`;
                }).join('') + `</div>`;
            } else if(q.Tipe_Soal === 'URAIAN_SINGKAT') {
                htmlInput = `<input type="text" value="${savedAns}" placeholder="Ketik jawaban singkat (Maks 3 Kata)" oninput="limitThreeWords(this); savePaginatorAnswerSingle(this.value)" class="w-full p-3 bg-slate-900 border border-slate-850 rounded-2xl text-xs text-slate-100 outline-none focus:border-teal-500 font-medium font-bold">`;
            } else if(q.Tipe_Soal === 'RUMPANG') {
                let reText = q.Teks_Soal.replace("[BLANK]", `<input type="text" value="${savedAns}" oninput="savePaginatorAnswerSingle(this.value)" class="mx-1.5 px-2 py-0.5 border-b border-teal-500 bg-slate-950 text-teal-400 font-extrabold text-center text-xs rounded w-24 outline-none" placeholder="...">`);
                htmlInput = `<div class="p-3.5 bg-slate-950 border border-slate-850 rounded-2xl text-xs leading-relaxed text-slate-300 font-medium">${reText}</div>`;
            } else if(q.Tipe_Soal === 'ESAI') {
                htmlInput = `<textarea rows="4" oninput="savePaginatorAnswerSingle(this.value)" class="w-full p-3 bg-slate-900 border border-slate-850 rounded-2xl text-xs text-slate-100 outline-none focus:border-teal-500 leading-relaxed" placeholder="Ketik esai uraian jawaban lengkap Anda disini...">${savedAns}</textarea>`;
            }

            let isFirst = currentQIndex === 0; let isLast = currentQIndex === activeQuestions.length - 1;
            let htmlFooter = `
                <div class="mt-6 pt-3 border-t border-slate-850 flex items-center justify-between gap-3">
                    <button onclick="navigatePaginator('prev')" ${isFirst ? 'disabled' : ''} class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl disabled:opacity-30"><i class="fas fa-chevron-left mr-1"></i>Sebelumnya</button>
                    ${isLast ? `<button onclick="confirmSubmitExamPaginator()" class="px-5 py-2.5 bg-teal-premium hover:bg-teal-700 text-white font-bold text-xs rounded-xl shadow-md uppercase tracking-wider">Kirim Jawaban <i class="fas fa-paper-plane ml-1"></i></button>` : `<button onclick="navigatePaginator('next')" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-xl">Berikutnya <i class="fas fa-chevron-right ml-1"></i></button>`}
                </div>
            `;

            canvas.innerHTML = `
                <div class="flex-1 flex flex-col justify-between animate-fade-in">
                    <div>
                        ${htmlHeader}
                        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-850 shadow-lg">
                            ${q.Tipe_Soal !== 'RUMPANG' ? `<p class="text-xs font-bold text-slate-200 leading-relaxed mb-4 pr-10">${q.Teks_Soal}</p>` : ''}
                            ${htmlMedia}${htmlInput}
                        </div>
                    </div>
                    ${htmlFooter}
                </div>
            `;
        }

        function savePaginatorAnswerSingle(val) { let id = activeQuestions[currentQIndex].ID_Soal; activeExam.jawabanSiswa[id] = val.trim(); }
        function savePaginatorAnswerComplex() { let id = activeQuestions[currentQIndex].ID_Soal; let checks = document.querySelectorAll(`input[name="ans-${id}"]:checked`); activeExam.jawabanSiswa[id] = Array.from(checks).map(c => c.value).sort().join(','); }
        function savePaginatorAnswerOrder() { let id = activeQuestions[currentQIndex].ID_Soal; let items = document.querySelectorAll(`#order-box-${id} [data-val]`); activeExam.jawabanSiswa[id] = Array.from(items).map(i => i.getAttribute('data-val')).join('|'); }
        function savePaginatorAnswerJodoh() { let id = activeQuestions[currentQIndex].ID_Soal; let selects = document.querySelectorAll(`select[data-left]`); let pairs = Array.from(selects).map(s => { let L = s.getAttribute('data-left'); let R = s.value; return R ? `${L}:${R}` : null; }).filter(p => p !== null); activeExam.jawabanSiswa[id] = pairs.join(','); }

        function navigatePaginator(dir) {
            if(dir === 'next' && currentQIndex < activeQuestions.length - 1) currentQIndex++;
            else if(dir === 'prev' && currentQIndex > 0) currentQIndex--;
            renderPaginatorExamViewport();
        }

        function confirmSubmitExamPaginator() { showCustomSystemDialog("Kirim Ujian", "Akhiri ujian? Anda tidak akan dapat kembali.", "warning", () => { autoSubmitExamFlow(); }); }

        function autoSubmitExamFlow() {
            isExamActive = false; clearInterval(examTimerInterval);
            if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});

            // HAPUS AUTOSAVE
            localStorage.removeItem(`smx_resume_${currentUser.Email}_${activeExam.ID_Jadwal}`);

            let correct = 0;
            activeQuestions.forEach(q => {
                let ans = activeExam.jawabanSiswa[q.ID_Soal] || ""; let key = q.Kunci_Jawaban || "";
                if(q.Tipe_Soal !== 'ESAI') { if(ans.toLowerCase() === key.toLowerCase()) correct++; }
            });

            let finalScore = activeQuestions.length > 0 ? Math.round((correct / activeQuestions.length) * 100) : 0;
            
            let payload = {
                ID_Hasil: "H" + (db.Tabel_Hasil.length + 1).toString().padStart(4, '0'),
                Email: currentUser.Email, ID_Jadwal: activeExam.ID_Jadwal, Skor: finalScore,
                Log_Pelanggaran: violationCount, Waktu_Submit: new Date().toLocaleString('id-ID')
            };

            db.Tabel_Hasil.push(payload); saveDatabaseToLocalStorage();
            if(isFirebaseConnected) firestoreDb.collection('hasil').doc(payload.ID_Hasil).set(payload);

            let canvas = document.getElementById('stu-content');
            canvas.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 text-center mt-6 shadow-xl animate-fade-in">
                    <div class="w-16 h-16 bg-teal-950/50 text-teal-400 border border-teal-800 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fas fa-check-double"></i></div>
                    <h3 class="font-bold text-white text-base">Jawaban Tersimpan</h3>
                    <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">Lembar ujian Anda telah berhasil diunggah secara permanen ke server.</p>
                    <div class="my-5 p-4 bg-slate-950 border border-slate-850 rounded-2xl text-left space-y-2 text-xs text-slate-300">
                        <div class="flex justify-between"><span>Pelanggaran:</span><span class="font-bold text-red-400">${violationCount} Kali</span></div>
                        <div class="flex justify-between"><span>Indeks Integritas:</span><span class="font-bold text-teal-400">${violationCount === 0 ? 'SANGAT TINGGI' : 'DISIPLIN TEREKAM'}</span></div>
                    </div>
                    <button onclick="renderStudentLandingArea()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-bold uppercase tracking-wider transition shadow-md">Kembali Ke Dashboard</button>
                </div>
            `;
        }

        function initAntiCheatSystem() {
            window.addEventListener('blur', () => { if(isExamActive) triggerCheatSiren("Pindah Layar/Tab Browser"); });
            document.addEventListener('visibilitychange', () => { if(document.hidden && isExamActive) triggerCheatSiren("Meminimize Aplikasi"); });
            window.addEventListener('resize', () => { if(isExamActive && !document.fullscreenElement) triggerCheatSiren("Keluar Mode Layar Penuh"); });
            document.addEventListener('contextmenu', e => { if(isExamActive) e.preventDefault(); });
            document.addEventListener('keydown', e => { if(isExamActive && (e.key === 'F12' || (e.ctrlKey && ['`','c','v','x','i','u','j'].includes(e.key.toLowerCase())))) { e.preventDefault(); triggerCheatSiren("Pintasan Tombol Terlarang"); } });
        }

        function triggerCheatSiren(reason) {
            if(!isExamActive) return; violationCount++;
            let bar = document.getElementById('cheat-bar'); bar.innerText = `SANKSI INTEGRITAS: [${reason}] DIKETAHUI (${violationCount}x)`; bar.classList.remove('hidden');
            setTimeout(() => { if(violationCount > 0) bar.classList.add('hidden'); }, 4000);
            if(violationCount >= 5) { autoSubmitExamFlow(); showCustomSystemDialog("Diskualifikasi Otomatis", "Sistem memblokir pengerjaan Anda karena melanggar aturan pengawasan lebih dari 5 kali.", "error"); }
        }

        function showCustomSystemDialog(title, msg, type = 'info', onConfirm = null) {
            let modal = document.getElementById('custom-modal'); document.getElementById('modal-title').innerText = title; document.getElementById('modal-message').innerText = msg;
            let icon = document.getElementById('modal-icon');
            icon.className = "w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 text-xl " + (type === 'error' ? 'bg-red-950/50 text-red-400 border border-red-800' : type === 'success' ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-800' : type === 'warning' ? 'bg-amber-950/50 text-amber-400 border border-amber-800' : 'bg-teal-950/50 text-teal-400 border border-teal-800');
            icon.innerHTML = `<i class="fas ${type === 'error' ? 'fa-circle-xmark' : type === 'success' ? 'fa-circle-check' : type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-info'}"></i>`;
            let actions = document.getElementById('modal-actions'); actions.innerHTML = '';
            if(onConfirm) {
                let btnCancel = document.createElement('button'); btnCancel.className = "px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl transition"; btnCancel.innerText = "Batal"; btnCancel.onclick = () => modal.classList.add('hidden');
                let btnOk = document.createElement('button'); btnOk.className = "px-4 py-2 bg-teal-premium hover:bg-teal-700 text-white text-xs font-bold rounded-xl transition shadow-md"; btnOk.innerText = "Lanjutkan"; btnOk.onclick = () => { modal.classList.add('hidden'); onConfirm(); };
                actions.appendChild(btnCancel); actions.appendChild(btnOk);
            } else {
                let btnOk = document.createElement('button'); btnOk.className = "px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-100 text-xs font-bold rounded-xl transition"; btnOk.innerText = "OK"; btnOk.onclick = () => modal.classList.add('hidden'); actions.appendChild(btnOk);
            }
            modal.classList.remove('hidden');
        }

        function moveItemUp(btn) { let item = btn.closest('[data-val]'); let prev = item.previousElementSibling; if(prev) item.parentNode.insertBefore(item, prev); }
        function moveItemDown(btn) { let item = btn.closest('[data-val]'); let next = item.nextElementSibling; if(next) item.parentNode.insertBefore(next, item); }
        function limitThreeWords(el) { let words = el.value.trim().split(/\s+/); if(words.length > 3) el.value = words.slice(0, 3).join(' '); }
        
        initAntiCheatSystem();
    </script>
</body>
</html>

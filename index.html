<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Exambro Anti-Curang v3.5 - Firebase Passwordless Edition</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Compat SDK Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'teal-premium': '#008080',
                        'gold-premium': '#D4AF37'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
        }
        
        /* Mobile Frame Simulator for Desktop Viewers */
        @media (min-width: 768px) {
            .mobile-simulator {
                max-width: 412px;
                margin: 2rem auto;
                border: 12px solid #1e293b;
                border-radius: 42px;
                box-shadow: 0 25px 60px -15px rgba(0, 128, 128, 0.25);
                height: 800px;
                overflow-y: auto;
                background: #0f172a;
                position: relative;
            }
            .mobile-simulator::-webkit-scrollbar { display: none; }

        /* Custom Modern Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 9px; }
        ::-webkit-scrollbar-thumb:hover { background: #008080; }

            box-shadow: 0 0 20px rgba(0, 128, 128, 0.15);
        }

</head>
<body class="text-slate-100 antialiased min-h-screen bg-gradient-to-tr from-slate-900 via-teal-950 to-slate-900 flex flex-col justify-between overflow-x-hidden">

    <!-- ANTI-ALERT CUSTOM DIALOG ENGINE -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-fade-in">
        <div class="bg-slate-900 rounded-3xl shadow-2xl border-t-4 border-gold-premium max-w-sm w-full p-6 text-center">
            <div id="modal-icon" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 text-xl"></div>
            <h3 id="modal-title" class="text-md font-bold text-slate-100 mb-2">Notifikasi Sistem</h3>
            <p id="modal-message" class="text-xs text-slate-400 mb-6 leading-relaxed">Isi pesan sistem.</p>
            <div id="modal-actions" class="flex justify-center gap-2"></div>
        </div>
    </div>

    <!-- UPPER ALARM ALERT BAR (ANTI-CHEAT LOGGER) -->
    <div id="cheat-bar" class="hidden fixed top-0 left-0 right-0 bg-red-600 text-white text-center py-2 text-[10px] font-bold tracking-widest uppercase z-[9999] animate-pulse">
        <i class="fas fa-exclamation-triangle mr-2"></i> Peringatan Integritas: Pelanggaran Layar Terdeteksi & Direkam!
    </div>

    <!-- SCREEN 1: SINGLE LOGIN & REGISTER (INTELLIGENT PASSWORDLESS AUTH) -->
    <div id="screen-auth" class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-slate-900/95 rounded-3xl shadow-2xl border border-slate-800 p-8 glow-teal">
            
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-teal-900/50 border border-teal-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg shadow-teal-500/10">
                    <i class="fas fa-shield-halved text-2xl text-teal-400"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white uppercase">SMARTEX</h1>
                <p class="text-xs text-teal-400 mt-1 tracking-wider uppercase font-semibold">Sistem Ujian Online Terintegrasi</p>
            </div>

            <!-- CONTAINER BOX LOGIN -->
            <div id="box-login" class="space-y-4">
                <form onsubmit="handleAuthLoginFlow(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Alamat Email Pengguna</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500" placeholder="Ketikkan Email Terdaftar (Siswa/Guru/Admin)">
                        </div>
                    </div>
                    <button type="submit" class="w-full py-3 bg-teal-premium hover:bg-teal-700 text-white font-bold rounded-xl shadow-lg transition text-xs uppercase tracking-wider flex items-center justify-center gap-2">
                        <span>Masuk Aplikasi</span> <i class="fas fa-arrow-right-to-bracket"></i>
                    </button>
                </form>
                <div class="text-center pt-3 border-t border-slate-800/60 text-xs text-slate-400">
                    Belum memiliki akun? <button onclick="toggleAuthViewport('signup')" class="text-gold-premium font-semibold hover:underline">Daftar Mandiri</button>
                </div>
            </div>

            <!-- CONTAINER BOX REGISTER -->
            <div id="box-signup" class="hidden space-y-4">
                <form onsubmit="handleAuthRegisterFlow(event)" class="space-y-3.5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Nama Lengkap</label>
                        <input type="text" id="reg-nama" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500" placeholder="Nama Lengkap Tanpa Gelar">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Email Aktif</label>
                        <input type="email" id="reg-email" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500" placeholder="nama@sekolah.sch.id">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Peran Akses</label>
                        <select id="reg-peran" onchange="toggleRegAttributePanel()" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500">
                            <option value="siswa">Peserta Didik (Siswa)</option>
                            <option value="guru">Guru Pengampu Mata Pelajaran</option>
                        </select>
                    </div>
                    <div id="panel-attr-siswa">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Pilih Kelas</label>
                        <select id="reg-kelas" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500"></select>
                    </div>
                    <div id="panel-attr-guru" class="hidden">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Pilih Mata Pelajaran Pengampu</label>
                        <select id="reg-mapel" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-xs text-slate-100 outline-none focus:border-teal-500"></select>
                    </div>
                    <button type="submit" class="w-full py-2.5 bg-gold-premium hover:bg-yellow-600 text-slate-950 font-bold rounded-xl text-xs uppercase tracking-wider shadow-md transition">
                        Kirim Pengajuan Pendaftaran
                    </button>
                </form>
                <div class="text-center pt-2 border-t border-slate-800/60 text-xs text-slate-400">
                    Sudah punya akun? <button onclick="toggleAuthViewport('login')" class="text-teal-400 font-semibold hover:underline">Masuk Saja</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: ADMIN & GURU DASHBOARD (RESPONSIVE VIEWPORT) -->
    <div id="screen-dashboard" class="hidden flex-1 flex flex-col md:flex-row h-full w-full">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-slate-950 text-slate-300 flex flex-col shadow-2xl border-r border-slate-800/80 flex-shrink-0 z-20">
            <div class="p-5 border-b border-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-teal-premium flex items-center justify-center text-white font-bold text-xl border border-gold-premium shadow-inner">FB</div>
                <div>
                    <h2 class="font-bold text-white text-sm truncate max-w-[140px]" id="dash-user-name">Pengguna</h2>
                    <span class="text-[10px] uppercase tracking-widest text-gold-premium font-semibold" id="dash-user-role">Role</span>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="dash-nav"></nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="handleLogout()" class="w-full py-2.5 bg-rose-950 hover:bg-rose-900 text-rose-300 rounded-xl text-xs font-bold uppercase tracking-wider transition flex items-center justify-center gap-2">
                    <i class="fas fa-power-off"></i> Akhiri Sesi
                </button>
            </div>
        </aside>

        <!-- Dynamic Content Workspace Canvas -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-900 text-slate-200">
            <div id="dash-content" class="max-w-6xl mx-auto space-y-6 pb-20"></div>
        </main>
    </div>

    <!-- SCREEN 3: SISWA AREA (MOBILE SIMULATOR COMPATIBLE - PAGINATED) -->
    <div id="screen-siswa" class="hidden flex-1 w-full h-full p-0 md:p-4 bg-slate-950/80">
        <div class="mobile-simulator flex flex-col min-h-screen md:min-h-0 bg-slate-900 text-slate-200">
            <header class="bg-slate-950 border-b border-slate-800 px-5 py-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center"><i class="fas fa-user-graduate text-sm text-teal-400"></i></div>
                    <div>
                        <p class="text-[10px] text-teal-400 font-bold uppercase tracking-wider">Kandidat Ujian</p>
                        <h3 class="font-bold text-xs tracking-tight text-white leading-tight" id="stu-name">Nama Siswa</h3>
                    </div>
                </div>
                <span class="px-2.5 py-1 bg-slate-800 rounded-full text-[9px] font-bold text-gold-premium border border-slate-700 uppercase" id="stu-kelas">KELAS</span>
            </header>
            
            <div class="flex-1 p-4 flex flex-col justify-between" id="stu-content"></div>
        </div>
    </div>

    <!-- JAVASCRIPT GLOBAL SYSTEM ENGINE -->
    <script>
        // Global Fallback Database Store (Mockup RAM)
        let db = {
            Tabel_Siswa: [
                { Email: "siswa1@sekolah.id", Nama: "Rian Hidayat", Kelas: "XII-IPA-1", Peran: "siswa", Status: "Active" },
                { Email: "siswa2@sekolah.id", Nama: "Nabila Putri", Kelas: "XII-IPA-1", Peran: "siswa", Status: "Active" }
            ],
            Tabel_Guru: [
                { Email: "guru1@sekolah.id", Nama: "Drs. Hermawan", ID_Mapel: "M-01", Peran: "guru", Status: "Active" }
            ],
            Tabel_Mapel: [
                { ID_Mapel: "M-01", Nama_Mapel: "Biologi" },
                { ID_Mapel: "M-02", Nama_Mapel: "Fisika" }
            ],
            Tabel_Kelas: [
                { ID_Kelas: "XII-IPA-1", Nama_Kelas: "XII-IPA-1" },
                { ID_Kelas: "XII-IPA-2", Nama_Kelas: "XII-IPA-2" }
            ],
            Tabel_Jadwal: [
                { ID_Jadwal: "J-01", ID_Mapel: "M-01", ID_Kelas: "XII-IPA-1", Waktu_Mulai: "2026-05-18T07:30", Durasi_Menit: 90, Status: "Aktif" }
            ],
            Tabel_Soal: [
                { ID_Soal: "S01", ID_Mapel: "M-01", Tipe_Soal: "PG", Teks_Soal: "Manakah organel sel tumbuhan berikut yang bertanggung jawab terhadap fotosintesis?", Tipe_Media: "gambar", URL_Media: "https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?w=500", Opsi_Jawaban: "A. Mitokondria|B. Kloroplas|C. Ribosom|D. Lisosom|E. Vakuola", Kunci_Jawaban: "B" },
                { ID_Soal: "S02", ID_Mapel: "M-01", Tipe_Soal: "PG_KOMPLEKS", Teks_Soal: "Pilih pernyataan yang tepat terkait karakteristik virus! (Pilih lebih dari satu)", Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "A. Memiliki DNA atau RNA|B. Bereproduksi dengan membelah diri|C. Merupakan organisme aseluler|D. Memiliki sitoplasma|E. Parasit obligat intraseluler", Kunci_Jawaban: "A,C,E" },
                { ID_Soal: "S03", ID_Mapel: "M-01", Tipe_Soal: "BENAR_SALAH", Teks_Soal: "Proses meiosis menghasilkan 4 sel anakan haploid yang identik secara genetik.", Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "Benar|Salah", Kunci_Jawaban: "Salah" },
                { ID_Soal: "S04", ID_Mapel: "M-01", Tipe_Soal: "URUTAN", Teks_Soal: "Urutkan dengan benar fase-fase dalam pembelahan mitosis!", Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "Profase|Metafase|Anafase|Telofase", Kunci_Jawaban: "Profase|Metafase|Anafase|Telofase" },
                { ID_Soal: "S05", ID_Mapel: "M-01", Tipe_Soal: "JODOH", Teks_Soal: "Jodohkan istilah biologi berikut dengan pengertiannya!", Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "Mitokondria:Energi,Kloroplas:Fotosintesis,Inti Sel:Genetik", Kunci_Jawaban: "Mitokondria:Energi,Kloroplas:Fotosintesis,Inti Sel:Genetik" },
                { ID_Soal: "S06", ID_Mapel: "M-01", Tipe_Soal: "URAIAN_SINGKAT", Teks_Soal: "Zat pigmen hijau daun yang berfungsi menangkap energi cahaya matahari dinamakan...",Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "", Kunci_Jawaban: "Klorofil" },
                { ID_Soal: "S07", ID_Mapel: "M-01", Tipe_Soal: "RUMPANG", Teks_Soal: "Proses penguapan air dari jaringan tumbuhan melalui stomata disebut [BLANK].", Tipe_Media: "", URL_Media: "", Opsi_Jawaban: "", Kunci_Jawaban: "Transpirasi" },
                { ID_Soal: "S08", ID_Mapel: "M-01", Tipe_Soal: "ESAI", Teks_Soal: "Jelaskan pengaruh suhu lingkungan terhadap kecepatan aktivitas enzim metabolisme sel!", Tipe_Media: "video", URL_Media: "https://www.youtube.com/watch?v=3mJ16x_LOnE", Opsi_Jawaban: "", Kunci_Jawaban: "" }
            ],
            Tabel_Hasil: []
        };

        // Static Master Admin Credential Set (Only Email - Passwordless)
        let masterAdmin = { Email: "abdulmuis11@guru.sma.belajar.id", Nama: "Administrator Utama", Peran: "admin" };
        
        let currentUser = null;
        let activeExam = null;
        let examTimerInterval = null;
        let violationCount = 0;
        let isExamActive = false;
        
        // Paginator Student Exam Engine
        let currentQIndex = 0;
        let activeQuestions = [];
        
        // Firebase Instances
        let firestoreDb = null;
        let isFirebaseConnected = false;

        window.onload = () => {
            initDatabaseFromLocalStorage();
            autoInitializeFirebaseConfig();
            renderInitialDropdowns();
            toggleRegAttributePanel();
        };

        function initDatabaseFromLocalStorage() {
            let localDb = localStorage.getItem('fb_exambro_db');
            if(localDb) {
                try { db = JSON.parse(localDb); } catch(e) {}
            }
        }

        function saveDatabaseToLocalStorage() {
            localStorage.setItem('fb_exambro_db', JSON.stringify(db));
        }

        function autoInitializeFirebaseConfig() {
            let configStr = localStorage.getItem('fb_config_json');
            if(configStr) {
                try {
                    let config = JSON.parse(configStr);
                    firebase.initializeApp(config);
                    firestoreDb = firebase.firestore();
                    isFirebaseConnected = true;
                    console.log("Firebase Database Engine successfully connected.");
                } catch(e) { console.error("Firebase startup fault: ", e); }
            }
        }

        function renderInitialDropdowns() {
            let kSel = document.getElementById('reg-kelas');
            let mSel = document.getElementById('reg-mapel');
            if(kSel) kSel.innerHTML = db.Tabel_Kelas.map(k => `<option value="${k.ID_Kelas}">${k.ID_Kelas}</option>`).join('');
            if(mSel) mSel.innerHTML = db.Tabel_Mapel.map(m => `<option value="${m.ID_Mapel}">${m.Nama_Mapel}</option>`).join('');
        }

        function toggleAuthViewport(mode) {
            if(mode === 'signup') {
                document.getElementById('box-login').classList.add('hidden');
                document.getElementById('box-signup').classList.remove('hidden');
            } else {
                document.getElementById('box-signup').classList.add('hidden');
                document.getElementById('box-login').classList.remove('hidden');
            }
        }

        function toggleRegAttributePanel() {
            let val = document.getElementById('reg-peran').value;
            if(val === 'siswa') {
                document.getElementById('panel-attr-siswa').classList.remove('hidden');
                document.getElementById('panel-attr-guru').classList.add('hidden');
            } else {
                document.getElementById('panel-attr-siswa').classList.add('hidden');
                document.getElementById('panel-attr-guru').classList.remove('hidden');
            }
        }

        // INTELLIGENT SINGLE LOG LOGIN FLOW (Cascading search mechanism - Passwordless Email Only)
        function handleAuthLoginFlow(e) {
            e.preventDefault();
            let email = document.getElementById('login-email').value.trim();

            // 1. Check Master Admin Credentials
            if(email === masterAdmin.Email) {
                currentUser = masterAdmin;
                showScreen('dashboard');
                buildDashboardRouterMenu();
                return;
            }

            // 2. Check Teacher credentials
            let t = db.Tabel_Guru.find(g => g.Email === email);
            if(t) {
                if(t.Status === 'Pending') {
                    showCustomSystemDialog("Akses Ditangguhkan", "Akun Guru Anda masih berstatus PENDING. Tunggu otorisasi persetujuan Admin.", "warning");
                    return;
                }
                currentUser = t;
                showScreen('dashboard');
                buildDashboardRouterMenu();
                return;
            }

            // 3. Check Student credentials
            let s = db.Tabel_Siswa.find(x => x.Email === email);
            if(s) {
                if(s.Status === 'Pending') {
                    showCustomSystemDialog("Akses Ditangguhkan", "Akun Siswa Anda belum disetujui (Approved) oleh Admin Sekolah.", "warning");
                    return;
                }
                currentUser = s;
                showScreen('siswa');
                renderStudentLandingArea();
                return;
            }

            showCustomSystemDialog("Autentikasi Gagal", "Alamat email tidak ditemukan dalam sistem database.", "error");
        }

        // REGISTER PROCESS: AUTO ASSIGN TO PENDING ACCORDING TO SYSTEM SPECS (Passwordless)
        function handleAuthRegisterFlow(e) {
            e.preventDefault();
            let email = document.getElementById('reg-email').value.trim();
            let nama = document.getElementById('reg-nama').value.trim();
            let peran = document.getElementById('reg-peran').value;

            // Duplicate checker
            if(db.Tabel_Siswa.some(x => x.Email===email) || db.Tabel_Guru.some(x => x.Email===email) || email===masterAdmin.Email) {
                showCustomSystemDialog("Pendaftaran Gagal", "Alamat email bersangkutan sudah terdaftar.", "error");
                return;
            }

            let payload = { Email: email, Nama: nama, Peran: peran, Status: "Pending", Timestamp: new Date().toLocaleDateString('id-ID') };
            
            if(peran === 'siswa') {
                payload.Kelas = document.getElementById('reg-kelas').value;
                db.Tabel_Siswa.push(payload);
            } else {
                payload.ID_Mapel = document.getElementById('reg-mapel').value;
                db.Tabel_Guru.push(payload);
            }

            saveDatabaseToLocalStorage();
            showCustomSystemDialog("Daftar Berhasil", "Registrasi akun mandiri berhasil diajukan! Akun Anda terkunci berstatus PENDING hingga disetujui Admin.", "success", () => {
                toggleAuthViewport('login');
            });
        }

        function handleLogout() {
            currentUser = null;
            isExamActive = false;
            clearInterval(examTimerInterval);
            if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
            showScreen('auth');
        }

        function showScreen(id) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-dashboard').classList.add('hidden');
            document.getElementById('screen-siswa').classList.add('hidden');
            document.getElementById(`screen-${id}`).classList.remove('hidden');
        }

        function buildDashboardRouterMenu() {
            document.getElementById('dash-user-name').innerText = currentUser.Nama;
            document.getElementById('dash-user-role').innerText = currentUser.Peran === 'admin' ? 'Super Admin' : 'Guru Mapel';
            
            let nav = document.getElementById('dash-nav');
            nav.innerHTML = '';
            let menus = [];

            if(currentUser.Peran === 'admin') {
                menus = [
                    { id: 'ad-stat', name: 'Ringkasan Statistik', icon: 'fa-chart-pie', action: viewAdminVisualStats },
                    { id: 'ad-approve', name: 'Persetujuan Akun (Approval)', icon: 'fa-user-check', action: viewApprovalWorkflowArea },
                    { id: 'ad-mapel', name: 'Mata Pelajaran', icon: 'fa-book-bookmark', action: viewManageMapelPanel },
                    { id: 'ad-kelas', name: 'Manajemen Kelas', icon: 'fa-school-flag', action: viewManageKelasPanel },
                    { id: 'ad-siswa', name: 'Data Master Siswa', icon: 'fa-users', action: viewManageSiswaPanel },
                    { id: 'ad-guru', name: 'Data Master Guru', icon: 'fa-user-tie', action: viewManageGuruPanel },
                    { id: 'ad-jadwal', name: 'Jadwal Ujian Rilis', icon: 'fa-calendar-days', action: viewManageJadwalPanel },
                    { id: 'ad-rekap', name: 'Laporan Rekap Nilai', icon: 'fa-file-invoice', action: viewRekapNilaiPanel },
                    { id: 'ad-config', name: 'Konfigurator Firebase', icon: 'fa-database', action: viewFirebaseSetupPanel }
                ];
            } else {

        function processAccountApproval(role, email, action) {
            let userList = role === 'siswa' ? db.Tabel_Siswa : db.Tabel_Guru;
            let idx = userList.findIndex(x => x.Email === email);
            if(idx > -1) {
                if(action === 'Active') {
                    userList[idx].Status = 'Active';
                    showCustomSystemDialog("Disetujui", `Akun ${email} berhasil di-approve & diaktifkan.`, "success");
                } else {
                    userList.splice(idx, 1);
                    showCustomSystemDialog("Ditolak", `Akun ${email} ditolak & dibatalkan dari sistem.`, "warning");
                }
                saveDatabaseToLocalStorage();
                viewApprovalWorkflowArea();
            }
        }

        function saveFirebaseSetupConfig() {
            let raw = document.getElementById('fb-config-raw').value.trim();
            if(!raw) { showCustomSystemDialog("Input Kosong", "Pastikan menyalin isian JSON SDK Config Firebase Anda.", "warning"); return; }
            try {
                JSON.parse(raw);
                localStorage.setItem('fb_config_json', raw);
                showCustomSystemDialog("Config Disimpan", "Config tersimpan di LocalStorage. Melakukan reload sistem...", "success", () => {
                    window.location.reload();
                });
            } catch(e) {
                showCustomSystemDialog("JSON Invalid", "String masukan bukan merupakan objek JSON valid.", "error");
            }
        }

        function handleSaveManualSoalFlow(e) {
            e.preventDefault();
            let tipe = document.getElementById('form-s-tipe').value;
            let opsi = document.getElementById('form-opsi-raw').value;
            let kunci = document.getElementById('form-kunci-raw').value;
            if(tipe === 'URUTAN' || tipe === 'JODOH') kunci = opsi;

            let payload = {
                ID_Soal: "S" + (db.Tabel_Soal.length+1).toString().padStart(3, '0'),
                ID_Mapel: document.getElementById('form-s-mapel').value,
                Tipe_Soal: tipe,
                Teks_Soal: document.getElementById('form-s-teks').value,
                Tipe_Media: document.getElementById('form-s-mediatype').value,
                URL_Media: document.getElementById('form-s-mediaurl').value,
                Opsi_Jawaban: opsi,
                Kunci_Jawaban: kunci
            };

            db.Tabel_Soal.push(payload);
            saveDatabaseToLocalStorage();
            document.getElementById('wrapper-form-soal').classList.add('hidden');
            triggerFilterSoalDatabase();
            showCustomSystemDialog("Berhasil", "Soal baru berhasil direkam ke bank soal.", "success");
        }

        function triggerFilterSoalDatabase() {
            let tbody = document.getElementById('tbody-soal');
            if(!tbody) return;
            tbody.innerHTML = '';

            let fMapel = document.getElementById('flt-s-mapel').value;
            let fTipe = document.getElementById('flt-s-tipe').value;
            let fKeyword = document.getElementById('flt-s-keyword').value.toLowerCase();

            let list = db.Tabel_Soal.filter(q => {
                let m1 = fMapel === "" ? true : q.ID_Mapel === fMapel;
                let m2 = fTipe === "" ? true : q.Tipe_Soal === fTipe;
                let m3 = fKeyword === "" ? true : q.Teks_Soal.toLowerCase().includes(fKeyword);
                return m1 && m2 && m3;
            });

            if(list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-500 italic">Tidak ada butir soal kriteria cocok.</td></tr>`;
                return;
            }

            list.forEach(q => {
                let mediaTag = q.URL_Media ? `<div class="mt-1 text-[10px] text-blue-400 font-mono font-medium truncate max-w-sm"><i class="fas fa-link mr-1"></i>[${q.Tipe_Media.toUpperCase()}] ${q.URL_Media}</div>` : '';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-900 transition text-slate-300">
                        <td class="p-4 font-mono font-bold text-slate-500 text-center">${q.ID_Soal}</td>
                        <td class="p-4"><span class="px-2 py-0.5 bg-slate-900 border border-slate-800 text-slate-300 font-bold rounded text-[9px] uppercase tracking-wider">${q.Tipe_Soal}</span></td>
                        <td class="p-4 text-xs font-medium text-slate-200">
                            <div class="line-clamp-2">${q.Teks_Soal}</div>
                            ${mediaTag}
                        </td>
                        <td class="p-4 font-mono text-xs font-bold text-emerald-400 bg-emerald-950/20">${q.Kunci_Jawaban}</td>
                    </tr>
                `;
            });
        }

        // EXCEL BULK EXPORTER & IMPORTER UTILS (Passwordless Adjustments)
        function downloadTemplateExcel(type) {
            let data = [];
            if(type === 'soal') {
                data = [
                    ["ID_Soal", "ID_Mapel", "Tipe_Soal", "Teks_Soal", "Tipe_Media", "URL_Media", "Opsi_Jawaban", "Kunci_Jawaban"],
                    ["S-AUTO", "M-01", "PG", "Contoh teks pertanyaan?", "none", "", "A. Opsi A|B. Opsi B|C. Opsi C|D. Opsi D|E. Opsi E", "A"]
                ];
            } else if(type === 'siswa') {
                data = [
                    ["Email", "Nama", "Kelas"],
                    ["siswa_baru@sekolah.id", "Aris Subastian", "XII-IPA-1"]
                ];
            } else if(type === 'guru') {
                data = [
                    ["Email", "Nama", "ID_Mapel"],
                    ["guru_baru@sekolah.id", "Hartono S.Pd", "M-01"]
                ];
            } else {
                data = [["ID_Kelas", "Nama_Kelas"], ["XII-IPA-3", "XII-IPA-3"]];
            }
            let ws = XLSX.utils.aoa_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `Template_${type}.xlsx`);
        }

        function handleExcelImportFlow(e, type) {
            let file = e.target.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(evt) {
                let data = new Uint8Array(evt.target.result);
                let workbook = XLSX.read(data, {type: 'array'});
                let sheet = workbook.Sheets[workbook.SheetNames[0]];
                let rows = XLSX.utils.sheet_to_json(sheet);
                
                rows.forEach(r => {
                    r.Status = "Active"; // Auto active for master imports
                    if(type === 'soal') {
                        r.ID_Soal = "S" + (db.Tabel_Soal.length+1).toString().padStart(3, '0');
                        db.Tabel_Soal.push(r);
                    } else if(type === 'siswa') {
                        r.Peran = 'siswa';
                        db.Tabel_Siswa.push(r);
                    } else if(type === 'guru') {
                        r.Peran = 'guru';
                        db.Tabel_Guru.push(r);
                    } else if(type === 'kelas') {
                        db.Tabel_Kelas.push(r);
                    } else if(type === 'mapel') {
                        db.Tabel_Mapel.push(r);
                    }
                });
                saveDatabaseToLocalStorage();
                renderInitialDropdowns();
                showCustomSystemDialog("Impor Berhasil", `Berhasil memuat massal data ${type} sebanyak ${rows.length} baris.`, "success", () => {
                    if(type==='soal') triggerFilterSoalDatabase();
                    else if(type==='siswa') viewManageSiswaPanel();
                    else if(type==='guru') viewManageGuruPanel();
                    else if(type==='kelas') viewManageKelasPanel();
                    else if(type==='mapel') viewManageMapelPanel();
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToPdfAction() {
            if(db.Tabel_Hasil.length === 0) { showCustomSystemDialog("Gagal Ekspor", "Data masih kosong.", "error"); return; }

            let doc = new jsPDF();

            doc.text("LAPORAN HASIL BELAJAR SISWA - EXAMBRO CLOUD", 14, 15);
            doc.autoTable({
                head: [['ID', 'Email Siswa', 'ID Sesi', 'Skor', 'Status Integritas', 'Waktu']],
                body: db.Tabel_Hasil.map(h => [h.ID_Hasil, h.Email, h.ID_Jadwal, h.Skor, `${h.Log_Pelanggaran} Pelanggaran`, h.Waktu_Submit]),
                startY: 22,
                headStyles: { fillColor: [0, 128, 128] }
            });
            doc.save("Laporan_Nilai_Exambro.pdf");
        }

        // ==========================================================
        // WORKSPACE AREA SISWA (ONE-BY-ONE PAGINATION ENGINE)
        // ==========================================================
        function renderStudentLandingArea() {
            document.getElementById('stu-name').innerText = currentUser.Nama;
            document.getElementById('stu-kelas').innerText = currentUser.Kelas;
            
            let canvas = document.getElementById('stu-content');
            let relevantJadwal = db.Tabel_Jadwal.filter(j => j.ID_Kelas === currentUser.Kelas);

            if(relevantJadwal.length === 0) {
                canvas.innerHTML = `
                    <div class="text-center py-12 px-4 bg-slate-900 border border-slate-800 rounded-3xl mt-6">
                        <i class="fas fa-calendar-times text-3xl text-slate-600 mb-3"></i>
                        <h4 class="font-bold text-xs text-slate-300">Tidak Ada Sesi Ujian</h4>
                        <p class="text-[10px] text-slate-500 mt-1">Saat ini belum ada sesi ujian aktif yang dijadwalkan untuk kelas ${currentUser.Kelas}.</p>
                    </div>
                `;
                return;
            }

            canvas.innerHTML = `
                <div class="space-y-4">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Daftar Jadwal Ujian Aktif</p>
                    ${relevantJadwal.map(j => {
                        let mapel = db.Tabel_Mapel.find(m => m.ID_Mapel === j.ID_Mapel);
                        return `
                            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg flex flex-col justify-between items-start gap-4">
                                <div class="w-full">
                                    <span class="px-2 py-0.5 bg-teal-950 border border-teal-800 text-teal-400 font-bold text-[9px] rounded uppercase">${j.ID_Mapel}</span>
                                    <h4 class="font-bold text-sm text-white mt-2">${mapel ? mapel.Nama_Mapel : 'Evaluasi Belajar'}</h4>
                                    <p class="text-[10px] text-slate-500 mt-1"><i class="fas fa-clock mr-1"></i>Durasi Batas: ${j.Durasi_Menit} Menit</p>
                                </div>
                                <button onclick="triggerVerificationFlow('${j.ID_Jadwal}')" class="w-full py-2.5 bg-teal-premium hover:bg-teal-700 text-white font-bold rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 transition">Mulai Ujian <i class="fas fa-play text-[10px]"></i></button>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function triggerVerificationFlow(idJadwal) {
            activeExam = db.Tabel_Jadwal.find(j => j.ID_Jadwal === idJadwal);
            let canvas = document.getElementById('stu-content');
            canvas.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl mt-6 text-center">
                    <div class="w-14 h-14 bg-amber-950/40 text-amber-500 border border-amber-800 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i class="fas fa-shield-lock"></i></div>
                    <h3 class="font-bold text-slate-200 text-sm">Validasi Integritas Layar</h3>
                    <p class="text-[10px] text-slate-400 mt-2 leading-relaxed">Sistem akan memvalidasi mode <b>Layar Penuh (Fullscreen)</b>. Pembagian layar (split screen), menekan tombol navigasi, atau pindah tab terekam sebagai kecurangan secara otomatis.</p>
                    
                    <div class="my-4 p-3 bg-amber-950/20 border border-amber-900/40 rounded-2xl text-left text-[10px] text-amber-300">
                        <h4 class="font-bold mb-1"><i class="fas fa-exclamation-triangle"></i> Sanksi Pelanggaran:</h4>
                        <p class="leading-relaxed">Setiap tindakan keluar layar dicatat. Sistem akan menutup lembar ujian paksa jika pelanggaran melebihi batas 5 kali.</p>
                    </div>

                    <button onclick="requestEnforceFullscreen()" class="w-full py-3 bg-gold-premium hover:bg-yellow-600 text-slate-950 font-extrabold rounded-2xl text-xs uppercase tracking-wider shadow-md transition">Kunci Layar & Mulai</button>
                </div>
            `;
        }

        function requestEnforceFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(startPaginatorExamExecution).catch(() => {
                    showCustomSystemDialog("Akses Ditolak", "Browser menolak mode fullscreen. Pastikan perizinan aktif.", "error");
                });
            } else {
                startPaginatorExamExecution();
            }
        }

        function startPaginatorExamExecution() {
            isExamActive = true;
            violationCount = 0;
            let secondsLeft = activeExam.Durasi_Menit * 60;
            activeExam.jawabanSiswa = {};

            activeQuestions = db.Tabel_Soal.filter(q => q.ID_Mapel === activeExam.ID_Mapel);
            currentQIndex = 0;

            renderPaginatorExamViewport();

            examTimerInterval = setInterval(() => {
                secondsLeft--;
                if(secondsLeft <= 0) {
                    clearInterval(examTimerInterval);
                    autoSubmitExamFlow();
                } else {
                    let m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
                    let s = (secondsLeft % 60).toString().padStart(2, '0');
                    let el = document.getElementById('clock-text');
                    if(el) el.innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function renderPaginatorExamViewport() {
            let canvas = document.getElementById('stu-content');
            if(activeQuestions.length === 0) {
                canvas.innerHTML = `<div class="p-4 text-center text-slate-500 text-xs">Belum ada paket soal mapel ini.</div>`;
                return;
            }

            let q = activeQuestions[currentQIndex];
            let mapel = db.Tabel_Mapel.find(m => m.ID_Mapel === activeExam.ID_Mapel);

            // TIMER BAR ATAS
            let htmlHeader = `
                <div class="bg-slate-950 p-3 rounded-2xl border border-slate-850 flex items-center justify-between mb-4 shadow-md">
                    <div>
                        <h4 class="text-[10px] font-extrabold text-teal-400 uppercase tracking-widest truncate max-w-[150px]">${mapel ? mapel.Nama_Mapel : 'Ujian'}</h4>
                        <p class="text-[9px] text-slate-500 mt-0.5">Soal ${currentQIndex + 1} dari ${activeQuestions.length}</p>
                    </div>
                    <div class="flex items-center gap-1.5 bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-xl font-mono text-xs font-bold text-amber-400">
                        <i class="fas fa-clock text-amber-500"></i> <span id="clock-text">--:--</span>
                    </div>
                </div>
            `;

            // RENDER MEDIA
            let htmlMedia = '';
            if(q.Tipe_Media === 'gambar' && q.URL_Media) {
                htmlMedia = `<img src="${q.URL_Media}" class="w-full max-h-40 object-contain rounded-2xl mb-3 border border-slate-800" alt="soal">`;
            } else if(q.Tipe_Media === 'video' && q.URL_Media) {
                let embed = q.URL_Media.replace("watch?v=", "embed/");
                htmlMedia = `<div class="w-full h-36 rounded-2xl overflow-hidden mb-3 border border-slate-800"><iframe src="${embed}" class="w-full h-full" allowfullscreen></iframe></div>`;
            }

            // RENDER JAWABAN BERDASARKAN 8 VARIASI TIPE
            let htmlInput = '';
            let savedAns = activeExam.jawabanSiswa[q.ID_Soal] || '';

            if(q.Tipe_Soal === 'PG' || q.Tipe_Soal === 'PG_KOMPLEKS') {
                let options = q.Opsi_Jawaban.split('|');
                let isComplex = q.Tipe_Soal === 'PG_KOMPLEKS';
                htmlInput = `<div class="space-y-2">` + options.map(o => {
                    let char = o.trim().substring(0, 1);
                    let isChecked = isComplex ? savedAns.split(',').includes(char) : savedAns === char;
                    return `
                        <label class="flex items-center gap-3 p-3 bg-slate-900 border border-slate-850 rounded-2xl hover:border-teal-500/50 cursor-pointer text-xs transition">
                            <input type="${isComplex ? 'checkbox' : 'radio'}" name="ans-${q.ID_Soal}" value="${char}" ${isChecked ? 'checked' : ''} onchange="${isComplex ? 'savePaginatorAnswerComplex()' : 'savePaginatorAnswerSingle(this.value)'}" class="w-4 h-4 text-teal-600 focus:ring-teal-500">
                            <span>${o}</span>
                        </label>
                    `;
                }).join('') + `</div>`;
            } else if(q.Tipe_Soal === 'BENAR_SALAH') {
                htmlInput = `
                    <div class="flex gap-2">
                        <button type="button" onclick="savePaginatorAnswerSingle('Benar'); renderPaginatorExamViewport()" class="flex-1 py-3 border rounded-xl font-bold text-xs ${savedAns==='Benar' ? 'bg-teal-premium border-teal-500 text-white' : 'bg-slate-900 border-slate-850 text-slate-300'}">Benar</button>
                        <button type="button" onclick="savePaginatorAnswerSingle('Salah'); renderPaginatorExamViewport()" class="flex-1 py-3 border rounded-xl font-bold text-xs ${savedAns==='Salah' ? 'bg-teal-premium border-teal-500 text-white' : 'bg-slate-900 border-slate-850 text-slate-300'}">Salah</button>
                    </div>
                `;
            } else if(q.Tipe_Soal === 'URUTAN') {
                let items = q.Opsi_Jawaban.split('|');
                if(savedAns) items = savedAns.split('|');
                htmlInput = `
                    <div class="space-y-2 p-2 bg-slate-950 border border-slate-850 rounded-2xl" id="order-box-${q.ID_Soal}">
                        ${items.map(it => `
                            <div data-val="${it}" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-800 rounded-xl text-xs text-slate-200">
                                <span>${it}</span>
                                <div class="flex gap-1">
                                    <button onclick="moveItemUp(this); savePaginatorAnswerOrder()" class="p-1 px-2 bg-slate-800 rounded text-[10px] font-bold"><i class="fas fa-chevron-up"></i></button>
                                    <button onclick="moveItemDown(this); savePaginatorAnswerOrder()" class="p-1 px-2 bg-slate-800 rounded text-[10px] font-bold"><i class="fas fa-chevron-down"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if(q.Tipe_Soal === 'JODOH') {
                let pairs = q.Opsi_Jawaban.split(',');
                let keysLeft = pairs.map(p => p.split(':')[0]);
                let valuesRight = pairs.map(p => p.split(':')[1]);
                htmlInput = `<div class="space-y-2">` + keysLeft.map(kl => {
                    let preVal = '';
                    if(savedAns) {
                        let fPair = savedAns.split(',').find(p => p.startsWith(kl+":"));
                        if(fPair) preVal = fPair.split(':')[1];
                    }
                    return `
                        <div class="flex items-center gap-2 bg-slate-900 p-2.5 border border-slate-850 rounded-2xl text-xs">
                            <span class="w-1/3 font-semibold text-slate-300">${kl}</span>
                            <i class="fas fa-arrow-right text-slate-600 text-[10px]"></i>
                            <select onchange="savePaginatorAnswerJodoh()" data-left="${kl}" class="flex-1 p-2 bg-slate-950 border border-slate-850 rounded-xl text-xs text-teal-400 outline-none">
                                <option value="">-- Jodohkan --</option>
                                ${valuesRight.map(vr => `<option value="${vr}" ${preVal===vr ? 'selected':''}>${vr}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }).join('') + `</div>`;
            } else if(q.Tipe_Soal === 'URAIAN_SINGKAT') {
                htmlInput = `<input type="text" value="${savedAns}" placeholder="Ketik jawaban singkat (Maks 3 Kata)" oninput="limitThreeWords(this); savePaginatorAnswerSingle(this.value)" class="w-full p-3 bg-slate-900 border border-slate-850 rounded-2xl text-xs text-slate-100 outline-none focus:border-teal-500 font-medium font-bold">`;
            } else if(q.Tipe_Soal === 'RUMPANG') {
                let reText = q.Teks_Soal.replace("[BLANK]", `<input type="text" value="${savedAns}" oninput="savePaginatorAnswerSingle(this.value)" class="mx-1.5 px-2 py-0.5 border-b border-teal-500 bg-slate-950 text-teal-400 font-extrabold text-center text-xs rounded w-24 outline-none" placeholder="...">`);
                htmlInput = `<div class="p-3.5 bg-slate-950 border border-slate-850 rounded-2xl text-xs leading-relaxed text-slate-300 font-medium">${reText}</div>`;
            } else if(q.Tipe_Soal === 'ESAI') {
                htmlInput = `<textarea rows="4" oninput="savePaginatorAnswerSingle(this.value)" class="w-full p-3 bg-slate-900 border border-slate-850 rounded-2xl text-xs text-slate-100 outline-none focus:border-teal-500 leading-relaxed" placeholder="Ketik esai uraian jawaban lengkap Anda disini...">${savedAns}</textarea>`;
            }

            // NAVIGATOR FOOTER CONTROL
            let isFirst = currentQIndex === 0;
            let isLast = currentQIndex === activeQuestions.length - 1;

            let htmlFooter = `
                <div class="mt-6 pt-3 border-t border-slate-850 flex items-center justify-between gap-3">
                    <button onclick="navigatePaginator('prev')" ${isFirst ? 'disabled' : ''} class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl disabled:opacity-30"><i class="fas fa-chevron-left mr-1"></i>Sebelumnya</button>
                    ${isLast ? 
                    `<button onclick="confirmSubmitExamPaginator()" class="px-5 py-2.5 bg-teal-premium hover:bg-teal-700 text-white font-bold text-xs rounded-xl shadow-md uppercase tracking-wider">Kirim Jawaban <i class="fas fa-paper-plane ml-1"></i></button>` : 
                    `<button onclick="navigatePaginator('next')" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-xl">Berikutnya <i class="fas fa-chevron-right ml-1"></i></button>`}
                </div>
            `;

            canvas.innerHTML = `
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        ${htmlHeader}
                        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-850 shadow-lg">
                            ${q.Tipe_Soal !== 'RUMPANG' ? `<p class="text-xs font-bold text-slate-200 leading-relaxed mb-4 pr-10">${q.Teks_Soal}</p>` : ''}
                            ${htmlMedia}
                            ${htmlInput}
                        </div>
                    </div>
                    ${htmlFooter}
                </div>
            `;
        }

        function savePaginatorAnswerSingle(val) {
            let id = activeQuestions[currentQIndex].ID_Soal;
            activeExam.jawabanSiswa[id] = val.trim();
        }

        function savePaginatorAnswerComplex() {
            let id = activeQuestions[currentQIndex].ID_Soal;
            let checks = document.querySelectorAll(`input[name="ans-${id}"]:checked`);
            activeExam.jawabanSiswa[id] = Array.from(checks).map(c => c.value).sort().join(',');
        }

        function savePaginatorAnswerOrder() {
            let id = activeQuestions[currentQIndex].ID_Soal;
            let items = document.querySelectorAll(`#order-box-${id} [data-val]`);
            activeExam.jawabanSiswa[id] = Array.from(items).map(i => i.getAttribute('data-val')).join('|');
        }

        function savePaginatorAnswerJodoh() {
            let id = activeQuestions[currentQIndex].ID_Soal;
            let selects = document.querySelectorAll(`select[data-left]`);
            let pairs = Array.from(selects).map(s => {
                let L = s.getAttribute('data-left');
                let R = s.value;
                return R ? `${L}:${R}` : null;
            }).filter(p => p !== null);
            activeExam.jawabanSiswa[id] = pairs.join(',');
        }

        function navigatePaginator(dir) {
            if(dir === 'next' && currentQIndex < activeQuestions.length - 1) currentQIndex++;
            else if(dir === 'prev' && currentQIndex > 0) currentQIndex--;
            renderPaginatorExamViewport();
        }

        function confirmSubmitExamPaginator() {
            showCustomSystemDialog("Kirim Ujian", "Apakah Anda yakin ingin mengakhiri sesi ujian? Jawaban akan dikunci di server permanen.", "warning", () => {
                autoSubmitExamFlow();
            });
        }

        function autoSubmitExamFlow() {
            isExamActive = false;
            clearInterval(examTimerInterval);
            if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});

            let correct = 0;
            activeQuestions.forEach(q => {
                let ans = activeExam.jawabanSiswa[q.ID_Soal] || "";
                let key = q.Kunci_Jawaban || "";
                if(q.Tipe_Soal !== 'ESAI') {
                    if(ans.toLowerCase() === key.toLowerCase()) correct++;
                }
            });

            let finalScore = activeQuestions.length > 0 ? Math.round((correct / activeQuestions.length) * 100) : 0;
            
            let payload = {
                ID_Hasil: "H" + (db.Tabel_Hasil.length + 1).toString().padStart(4, '0'),
                Email: currentUser.Email,
                ID_Jadwal: activeExam.ID_Jadwal,
                Skor: finalScore,
                Log_Pelanggaran: violationCount,
                Waktu_Submit: new Date().toLocaleString('id-ID')
            };

            db.Tabel_Hasil.push(payload);
            saveDatabaseToLocalStorage();

            let canvas = document.getElementById('stu-content');
            canvas.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 text-center mt-6 shadow-xl">
                    <div class="w-16 h-16 bg-teal-950/50 text-teal-400 border border-teal-800 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fas fa-check-double"></i></div>
                    <h3 class="font-bold text-white text-base">Jawaban Tersimpan</h3>
                    <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">Lembar ujian Anda telah berhasil diunggah secara aman ke database server cloud.</p>
                    
                    <div class="my-5 p-4 bg-slate-950 border border-slate-850 rounded-2xl text-left space-y-2 text-xs text-slate-300">
                        <div class="flex justify-between"><span>Pelanggaran:</span><span class="font-bold text-red-400">${violationCount} Kali</span></div>
                        <div class="flex justify-between"><span>Indeks Integritas:</span><span class="font-bold text-teal-400">${violationCount === 0 ? 'SANGAT TINGGI' : 'DISIPLIN TEREKAM'}</span></div>
                    </div>

                    <button onclick="handleLogout()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-bold uppercase tracking-wider transition shadow-md">Kembali Ke Log In</button>
                </div>
            `;
        }

        // ==========================================================
        // SUB-SISTEM ANTI-CHEAT SECURITY
        // ==========================================================
        function initAntiCheatSystem() {
            window.addEventListener('blur', () => { triggerCheatSiren("Pindah Layar/Tab Browser"); });
            document.addEventListener('visibilitychange', () => { if(document.hidden) triggerCheatSiren("Meminimize Aplikasi"); });
            window.addEventListener('resize', () => { if(isExamActive && !document.fullscreenElement) triggerCheatSiren("Keluar Mode Layar Penuh"); });
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if(e.key === 'F12' || (e.ctrlKey && ['`','c','v','x','i','u','j'].includes(e.key.toLowerCase()))) {
                    e.preventDefault();
                    triggerCheatSiren("Pintasan Tombol Terlarang");
                }
            });
        }

        function triggerCheatSiren(reason) {
            if(!isExamActive) return;
            violationCount++;
            let bar = document.getElementById('cheat-bar');
            bar.innerText = `SANKSI INTEGRITAS: [${reason}] DIKETAHUI (${violationCount}x)`;
            bar.classList.remove('hidden');
            setTimeout(() => { if(violationCount > 0) bar.classList.add('hidden'); }, 4000);
            if(violationCount >= 5) {
                autoSubmitExamFlow();
                showCustomSystemDialog("Diskualifikasi Otomatis", "Sistem memblokir pengerjaan Anda karena melanggar aturan pengawasan lebih dari 5 kali.", "error");
            }
        }

        // CUSTOM DIALOG OVERLAY CREATION MODULE (ANTI ALERT)
        function showCustomSystemDialog(title, msg, type = 'info', onConfirm = null) {
            let modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            
            let icon = document.getElementById('modal-icon');
            icon.className = "w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 text-xl " + 
                (type === 'error' ? 'bg-red-950/50 text-red-400 border border-red-800' : 
                 type === 'success' ? 'bg-emerald-950/50 text-emerald-400 border border-emerald-800' : 
                 type === 'warning' ? 'bg-amber-950/50 text-amber-400 border border-amber-800' : 
                 'bg-teal-950/50 text-teal-400 border border-teal-800');
            icon.innerHTML = `<i class="fas ${type === 'error' ? 'fa-circle-xmark' : type === 'success' ? 'fa-circle-check' : type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-info'}"></i>`;

            let actions = document.getElementById('modal-actions');
            actions.innerHTML = '';

            if(onConfirm) {
                let btnCancel = document.createElement('button');
                btnCancel.className = "px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-xl transition";
                btnCancel.innerText = "Batal";
                btnCancel.onclick = () => modal.classList.add('hidden');
                
                let btnOk = document.createElement('button');
                btnOk.className = "px-4 py-2 bg-teal-premium hover:bg-teal-700 text-white text-xs font-bold rounded-xl transition shadow-md";
                btnOk.innerText = "Lanjutkan";
                btnOk.onclick = () => { modal.classList.add('hidden'); onConfirm(); };
                
                actions.appendChild(btnCancel); actions.appendChild(btnOk);
            } else {
                let btnOk = document.createElement('button');
                btnOk.className = "px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-100 text-xs font-bold rounded-xl transition";
                btnOk.innerText = "OK";
                btnOk.onclick = () => modal.classList.add('hidden');
                actions.appendChild(btnOk);
            }
            modal.classList.remove('hidden');
        }

        // TOOL UTILS
        function moveItemUp(btn) { let item = btn.closest('[data-val]'); let prev = item.previousElementSibling; if(prev) item.parentNode.insertBefore(item, prev); }
        function moveItemDown(btn) { let item = btn.closest('[data-val]'); let next = item.nextElementSibling; if(next) item.parentNode.insertBefore(next, item); }
        function limitThreeWords(el) { let words = el.value.trim().split(/\s+/); if(words.length > 3) el.value = words.slice(0, 3).join(' '); }
    </script>
</body>
</html>
